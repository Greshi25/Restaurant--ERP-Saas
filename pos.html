<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Point of Sale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Point of Sale</h1>
    <p>Cashier 1</p>
  </header>

  <!--  Search Section -->
  <section class="search-section">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search food items...">
      <span class="search-icon">🔍</span>
    </div>
    <div class="categories">
      <button class="cat-btn active" data-category="all">All</button>
      <button class="cat-btn" data-category="main">Main Course</button>
      <button class="cat-btn" data-category="rice">Rice</button>
      <button class="cat-btn" data-category="beverages">Beverages</button>
      <button class="cat-btn" data-category="sweet">Sweet</button>
      <button class="cat-btn" data-category="bread">Bread</button>
    </div>
  </section>

  <!--  Bill Section -->
  <section class="bill-section">
    <h2>Bill Number: #1031</h2>
    <p>Status: Processing Bill #1031</p>
    <p>Table: 1</p>

    <table class="bill-table">
      <thead>
        <tr>
          <th>Dish</th>
          <th>Price (Rs)</th>
        </tr>
      </thead>
      <tbody>
        <!--  Products will be added dynamically by JS -->
      </tbody>
    </table>
  </section>

  <!--  Items Section -->
  <section id="items-section">
    <div class="item" data-category="main">
      Paneer Butter Masala - Rs 250
      <button onclick="addToCart('Paneer Butter Masala', 250)">Add to Cart</button>
    </div>
    <div class="item" data-category="main">
      Dal Tadka - Rs 150
      <button onclick="addToCart('Dal Tadka', 150)">Add to Cart</button>
    </div>
    <div class="item" data-category="rice">
      Veg Fried Rice - Rs 180
      <button onclick="addToCart('Veg Fried Rice', 180)">Add to Cart</button>
    </div>
    <div class="item" data-category="rice">
      Jeera Rice - Rs 120
      <button onclick="addToCart('Jeera Rice', 120)">Add to Cart</button>
    </div>
    <div class="item" data-category="beverages">
      Cold Drink - Rs 50
      <button onclick="addToCart('Cold Drink', 50)">Add to Cart</button>
    </div>
    <div class="item" data-category="beverages">
      Lassi - Rs 80
      <button onclick="addToCart('Lassi', 80)">Add to Cart</button>
    </div>
    <div class="item" data-category="sweet">
      Gulab Jamun - Rs 100
      <button onclick="addToCart('Gulab Jamun', 100)">Add to Cart</button>
    </div>
    <div class="item" data-category="bread">
      Butter Naan - Rs 40
      <button onclick="addToCart('Butter Naan', 40)">Add to Cart</button>
    </div>
  </section>

  <!-- Payment Section -->
  <section class="payment-section">
    <!-- Total Row -->
    <div class="row">
      <label>Total:</label>
      <input type="number" id="total-amount" readonly>
    </div>

    <!-- Payment Row -->
    <div class="row">
      <label>Payment:</label>
      <select id="payment-method">
        <option value="cash">Cash</option>
        <option value="card">Card</option>
        <option value="upi">UPI</option>
      </select>
      <input type="number" id="pay-amount" placeholder="Enter amount">
    </div>

    <!-- Split Button -->
    <div class="split-btn-row">
      <button class="split-btn">+ Split</button>
    </div>

    <!-- Complete Payment -->
    <div class="center-btn">
      <button class="complete-btn">Complete Payment</button>
    </div>
  </section>

  <!-- ✅ JS link -->
  <script src="script.js"></script>
</body>
</html>
